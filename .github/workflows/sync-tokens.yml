name: Sync Figma Tokens

on:
  # Manual trigger from the GitHub Actions UI (always runs immediately)
  workflow_dispatch:
  # Scheduled for 9 AM America/Chicago (Central) every Monday.
  # GitHub cron is UTC-only and ignores daylight saving, so we fire at BOTH
  # 14:00 UTC (= 09:00 CDT, summer) and 15:00 UTC (= 09:00 CST, winter). The
  # "gate" job lets exactly one of them proceed — whichever equals 09:00 in
  # Chicago right now — so it always lands at 9 AM Central year-round.
  schedule:
    - cron: '0 14 * * 1'
    - cron: '0 15 * * 1'

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - name: Proceed only at 9 AM Central (manual runs always proceed)
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$(TZ='America/Chicago' date +%H)" = "09" ]; then
            echo "It is 9 AM in America/Chicago — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not 9 AM in America/Chicago (currently $(TZ='America/Chicago' date +%H:%M)) — skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  sync:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync tokens from Figma
        run: npm run tokens
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}

      - name: Commit and push if tokens changed
        run: |
          if git diff --quiet src/tokens/tokens.css; then
            echo "No token changes — nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/tokens/tokens.css
            git commit -m "chore: sync design tokens from Figma"
            git push
            echo "Pushed updated tokens to main."
          fi
